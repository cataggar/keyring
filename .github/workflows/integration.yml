name: Integration

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev libglib2.0-dev dbus gnome-keyring libsecret-tools python3-pip

      - name: Install Python keyring
        if: runner.os == 'Linux'
        run: pip install keyring

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Run Linux integration tests
        if: runner.os == 'Linux'
        shell: bash
        run: |
          dbus-run-session -- bash -lc '
            set -euo pipefail
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"

            # Force the default Secret Service collection to be created and
            # unlocked before the interop tests. gnome-keyring-daemon coming up
            # does not by itself guarantee the "default" alias exists, which is
            # what Python keyring writes through. Without this warm-up the
            # interop test intermittently fails because the write lands in a
            # location that subsequent reads from a separate process cannot
            # find (issue #23). secret-tool ships with libsecret-tools and uses
            # the same libsecret path Python keyring ends up on, so a successful
            # round-trip here proves the environment is ready.
            for i in $(seq 1 40); do
              if printf "%s" warmup | secret-tool store --label=keyring-ci-warmup app keyring-ci 2>/dev/null \
                 && [ "$(secret-tool lookup app keyring-ci 2>/dev/null)" = "warmup" ]; then
                secret-tool clear app keyring-ci 2>/dev/null || true
                break
              fi
              if [ "$i" = "40" ]; then
                echo "Secret Service default collection not ready after warmup"
                exit 1
              fi
              sleep 0.25
            done

            bash tests/integration.sh
            bash tests/python_interop.sh
          '

      - name: Run macOS integration tests
        if: runner.os == 'macOS'
        shell: bash
        run: |
          KC="$RUNNER_TEMP/test.keychain-db"
          cleanup() {
            security delete-keychain "$KC" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          security create-keychain -p '' "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p '' "$KC"
          security default-keychain -s "$KC"
          security list-keychains -s "$KC"
          bash tests/integration.sh

      - name: Run Windows integration tests
        if: runner.os == 'Windows'
        shell: bash
        run: bash tests/integration.sh
